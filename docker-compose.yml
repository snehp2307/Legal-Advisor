services:
  backend:
    build: .
    container_name: legal_ai_backend
    ports:
      - "8001:8001"
    depends_on:
      - qdrant
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    volumes:
      - .:/app

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant_db
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  ui:
    build: .
    container_name: legal_ai_ui
    ports:
      - "8501:8501"
    depends_on:
      - backend
    command: streamlit run ui.py --server.port=8501 --server.address=0.0.0.0
    volumes:
      - .:/app

volumes:
  qdrant_storage: